name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ secrets.VITE_SUPABASE_URL != '' && secrets.VITE_SUPABASE_ANON_KEY != '' && secrets.PLAYWRIGHT_ADMIN_EMAIL != '' && secrets.PLAYWRIGHT_ADMIN_PASSWORD != '' && secrets.PLAYWRIGHT_MEMBER_EMAIL != '' && secrets.PLAYWRIGHT_MEMBER_PASSWORD != '' && secrets.PLAYWRIGHT_PENDING_EMAIL != '' && secrets.PLAYWRIGHT_PENDING_PASSWORD != '' }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
      PLAYWRIGHT_MEMBER_EMAIL: ${{ secrets.PLAYWRIGHT_MEMBER_EMAIL }}
      PLAYWRIGHT_MEMBER_PASSWORD: ${{ secrets.PLAYWRIGHT_MEMBER_PASSWORD }}
      PLAYWRIGHT_PENDING_EMAIL: ${{ secrets.PLAYWRIGHT_PENDING_EMAIL }}
      PLAYWRIGHT_PENDING_PASSWORD: ${{ secrets.PLAYWRIGHT_PENDING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
